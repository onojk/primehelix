name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt pytest

      - name: Run tests
        run: |
          . .venv/bin/activate
          pytest -q

      - name: Smoke test exact counts
        run: |
          . .venv/bin/activate
          FAST_MODE=1 python exact_lopsided_counts.py > /dev/null

      - name: Generate basic plots
        run: |
          . .venv/bin/activate
          python plot_lopsided_convergence.py
          python plot_multi_theta.py
          python plot_multi_theta_delta.py

      - name: Upload plots
        uses: actions/upload-artifact@v4
        with:
          name: plots-${{ matrix.python-version }}
          path: |
            *.png
